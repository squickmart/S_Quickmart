          res.innerHTML = `<div class="browse-profit-val">—</div><div class="browse-profit-hint">Enter qty above</div>`;
          return;
        }
        const total = perUnitProfit * qty;
        const cls = total >= 0 ? "" : " neg";
        res.innerHTML = `<div class="browse-profit-val${cls}">${total >= 0 ? "+₹" : "₹"}${Math.abs(total).toFixed(2)}</div><div class="browse-profit-hint">on ${qty} unit${qty !== 1 ? "s" : ""}</div>`;
      }

      function browseEditToggle(groupKey) {
        browseEditGroupKey = browseEditGroupKey === groupKey ? null : groupKey;
        renderBrowse();
        if (browseEditGroupKey) {
          setTimeout(() => {
            const firstId = groupKey.split(",")[0];
            const inp = document.getElementById("bie-variant-" + firstId);
            if (inp) inp.focus();
          }, 50);
        }
      }

      function setBieUnit(id, unit) {
        bieUnitOverrides[id] = unit;
        document
          .querySelectorAll(`.qty-unit-btn[data-row="bie-${id}"]`)
          .forEach((b) => b.classList.toggle("active", b.dataset.unit === unit));
      }

      function browseSaveEditGroup(groupKey) {
        const ids = groupKey.split(",");
        let updatedCount = 0;
        let hadError = false;

        for (const id of ids) {
          const variantInp = document.getElementById("bie-variant-" + id);
          const buyInp = document.getElementById("bie-buy-" + id);
          const sellInp = document.getElementById("bie-sell-" + id);
          const qtyInp = document.getElementById("bie-qty-" + id);
          const newVariant = variantInp ? variantInp.value.trim() : "";
          const b = parseFloat(buyInp ? buyInp.value : "") || 0;
          const s = parseFloat(sellInp ? sellInp.value : "") || 0;
          const q = parseFloat(qtyInp ? qtyInp.value : "") || 0;

          if (!b || !s) {
            hadError = true;
            continue;
          }

          const item = items.find((i) => i.id === id);
          if (item) {
            item.variant = newVariant;
            item.buy = b;
            item.sell = s;
            item.qty = q;
            item.unit = bieUnitOverrides[id] || item.unit || "PCS";
            updatedCount++;
          }
          delete bieUnitOverrides[id];
        }

        if (hadError) {
          showToast("⚠️ Please enter both prices for every size!");
          return;
        }

        browseEditGroupKey = null;
        renderBrowse();
        renderList();
        updateSummary();
        scheduleSave();
        showToast(`✅ ${updatedCount} size${updatedCount !== 1 ? "s" : ""} updated!`);
      }

      function browseToggleGroup(groupKey) {
        const ids = groupKey.split(",");
        const groupItems = items.filter((i) => ids.includes(i.id));
        if (!groupItems.length) return;
        const allAvailable = groupItems.every((i) => i.available !== false);
        const newState = !allAvailable;
        groupItems.forEach((i) => (i.available = newState));
        renderBrowse();
        renderList();
        scheduleSave();
        showToast(
          newState
            ? "✅ " + groupItems[0].name + " — Available"
            : "⛔ " + groupItems[0].name + " — Unavailable",
        );
      }

      function browseDelGroup(groupKey, name) {
        const ids = groupKey.split(",");
        const msg =
          ids.length > 1
            ? `"${name}" — all ${ids.length} sizes will be deleted. Continue?`
            : `"${name}" will be deleted. Continue?`;
        if (!confirm(msg)) return;
        items = items.filter((i) => !ids.includes(i.id));
        if (browseEditGroupKey === groupKey) browseEditGroupKey = null;
        renderBrowse();
        renderList();
        updateSummary();
        scheduleSave();
        showToast("🗑 Deleted");
      }


      function browseFilterItems() {
        const inp = document.getElementById("browse-search-inp");
        browseItemSearch = inp ? inp.value : "";
        renderBrowse();
      }

      function browseGoAreas() {
        browseItemSearch = "";
        browseState = { view: "areas", areaId: null, shopId: null };
        renderBrowse();
      }
      function browseGoShops(areaId) {
        browseItemSearch = "";
        browseState = { view: "shops", areaId, shopId: null };
        renderBrowse();
      }
      function browseGoItems(areaId, shopId) {
        browseItemSearch = "";
        browseState = { view: "items", areaId, shopId };
        renderBrowse();
      }

      function populateAreaDropdowns() {
        // item add form area dropdown
        const areaEl = document.getElementById("inp-area");
        if (!areaEl) return;
        const prev = areaEl.value;
        areaEl.innerHTML =
          '<option value="">— Area —</option>' +
          areas
            .map(
              (a) =>
                `<option value="${a.id}"${a.id === prev ? " selected" : ""}>${a.name}</option>`,
            )
            .join("");

        // shop add form area dropdown (only if the legacy field exists)
        const shopAreaEl = document.getElementById("inp-shop-area");
        if (shopAreaEl) {
          const prev2 = shopAreaEl.value;
          shopAreaEl.innerHTML =
            '<option value="">— Select Area —</option>' +
            areas
              .map(
                (a) =>
                  `<option value="${a.id}"${a.id === prev2 ? " selected" : ""}>${a.name}</option>`,
              )
              .join("");
        }

        if (prev) onAreaChange();
        else renderHomeAvailability();
      }

      function onAreaChange() {
        const areaId = document.getElementById("inp-area").value;
        const shopEl = document.getElementById("inp-shop");
        if (!areaId) {
          shopEl.innerHTML = '<option value="">— Shop —</option>';
          renderHomeAvailability();
          checkImportBtn();
          return;
        }
        const area = areas.find((a) => a.id === areaId);
        shopEl.innerHTML =
          '<option value="">— Shop —</option>' +
          (area
            ? area.shops
                .map((s) => `<option value="${s.id}">${s.name}</option>`)
                .join("")
            : "");
        renderHomeAvailability();
        checkImportBtn();
      }

      // ══ IMPORT FROM ANOTHER SHOP ════════════════════════════
      let importSelected = new Set();

      function checkImportBtn() {
        const btn = document.getElementById("import-shop-btn");
        if (!btn) return;
        const areaId = document.getElementById("inp-area").value;
        const shopId = document.getElementById("inp-shop").value;
        btn.disabled = !(areaId && shopId);
      }

      function openImportModal() {
        const areaId = document.getElementById("inp-area").value;
        const shopId = document.getElementById("inp-shop").value;
        if (!areaId || !shopId) return;

        const area = areas.find((a) => a.id === areaId);
        const shop = area ? area.shops.find((s) => s.id === shopId) : null;
        if (!area || !shop) return;

        document.getElementById("import-modal-sub").textContent =
          "Copying into: " + area.name + " · " + shop.name;

        // Build source shop list = every shop except the currently selected one
        const sourceSelect = document.getElementById("import-source-select");
        let options = '<option value="">— Select source shop —</option>';
        areas.forEach((a) => {
          a.shops.forEach((s) => {
            if (a.id === areaId && s.id === shopId) return; // skip same shop
            options += `<option value="${a.id}::${s.id}">${a.name} · ${s.name}</option>`;
          });
        });
        sourceSelect.innerHTML = options;

        importSelected = new Set();
        document.getElementById("import-modal-body").innerHTML =
          '<div class="import-empty">Select a shop above to see its items.</div>';
        document.getElementById("import-confirm-btn").textContent = "Import (0)";
        document.getElementById("import-confirm-btn").disabled = true;

        document.getElementById("import-modal-overlay").classList.add("open");
      }

      function closeImportModal() {
        document.getElementById("import-modal-overlay").classList.remove("open");
      }

      function renderImportItems() {
        const val = document.getElementById("import-source-select").value;
        const body = document.getElementById("import-modal-body");
        importSelected = new Set();
        updateImportConfirmBtn();

        if (!val) {
          body.innerHTML = '<div class="import-empty">Select a shop above to see its items.</div>';
          return;
        }
        const [srcAreaId, srcShopId] = val.split("::");
        const srcArea = areas.find((a) => a.id === srcAreaId);
        const srcShop = srcArea ? srcArea.shops.find((s) => s.id === srcShopId) : null;
        if (!srcArea || !srcShop) {
          body.innerHTML = '<div class="import-empty">Shop not found.</div>';
          return;
        }

        const srcItems = items.filter((i) => itemBelongsToShop(i, srcArea, srcShop));
        if (!srcItems.length) {
          body.innerHTML = `<div class="import-empty">No items found in <strong>${srcShop.name}</strong>.</div>`;
          return;
        }

        let html = `<span class="import-select-all" onclick="toggleImportSelectAll('${val.replace(/'/g, "&#39;")}')">Select all</span>`;
        html += srcItems
          .map((it) => {
            const qtyTxt = it.qty ? `${it.qty} ${it.unit || "PCS"} · ` : "";
            return `
        <label class="import-item-row">
          <input type="checkbox" data-id="${it.id}" onchange="toggleImportItem('${it.id}', this.checked)" />
          <div class="import-item-info">
            <div class="import-item-name">${it.name}${it.variant ? ` <span class="item-variant-tag">${it.variant}</span>` : ""}</div>
            <div class="import-item-meta">${qtyTxt}₹${it.buy.toFixed(2)} → ₹${it.sell.toFixed(2)}</div>
          </div>
        </label>`;
          })
          .join("");
        body.innerHTML = html;
      }

      function toggleImportItem(id, checked) {
        if (checked) importSelected.add(id);
        else importSelected.delete(id);
        updateImportConfirmBtn();
      }

      function toggleImportSelectAll(val) {
        const boxes = document.querySelectorAll(
          '#import-modal-body input[type="checkbox"]',
        );
        const allChecked = importSelected.size === boxes.length && boxes.length > 0;
        boxes.forEach((b) => {
          b.checked = !allChecked;
          if (!allChecked) importSelected.add(b.dataset.id);
          else importSelected.delete(b.dataset.id);
        });
        updateImportConfirmBtn();
      }

      function updateImportConfirmBtn() {
        const btn = document.getElementById("import-confirm-btn");
        btn.textContent = `Import (${importSelected.size})`;
        btn.disabled = importSelected.size === 0;
      }

      function confirmImport() {
        if (!importSelected.size) return;
        const areaId = document.getElementById("inp-area").value;
        const shopId = document.getElementById("inp-shop").value;
        const area = areas.find((a) => a.id === areaId);
        const shop = area ? area.shops.find((s) => s.id === shopId) : null;
        if (!area || !shop) return;

        let importedCount = 0;
        let skippedCount = 0;

        importSelected.forEach((id) => {
          const src = items.find((i) => i.id === id);
          if (!src) return;

          // Avoid duplicating if an item with the same name + variant already exists in target shop
          const alreadyThere = items.some(
            (i) =>
              i.name.toLowerCase() === src.name.toLowerCase() &&
              (i.variant || "").toLowerCase() === (src.variant || "").toLowerCase() &&
              itemBelongsToShop(i, area, shop),
          );
          if (alreadyThere) {
            skippedCount++;
            return;
          }

          items.unshift({
            id: uid(),
            name: src.name,
            variant: src.variant || "",
            buy: src.buy,
            sell: src.sell,
            qty: src.qty,
            unit: src.unit,
            area: area.name,
            shop: shop.name,
            areaId: area.id,
            shopId: shop.id,
            available: true,
          });
          importedCount++;
        });

        closeImportModal();
        renderList();
        updateSummary();
        renderHomeAvailability();
        renderBrowse();
        scheduleSave();

        if (importedCount && skippedCount) {
          showToast(`✅ ${importedCount} item${importedCount !== 1 ? "s" : ""} imported, ${skippedCount} skipped (already exists)`);
        } else if (importedCount) {
          showToast(`✅ ${importedCount} item${importedCount !== 1 ? "s" : ""} imported into ${shop.name}!`);
        } else {
          showToast("⚠️ All selected items already exist in this shop");
        }
      }

      // ══ UNIT TOGGLE ════════════════════════════════════════
      function setUnit(unit) {
        currentUnit = unit;
        document
          .querySelectorAll("#main-qty-row .qty-unit-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .getElementById("unit-" + unit.toLowerCase())
          .classList.add("active");
      }

      // ══ MULTI-VARIANT ADD FORM ══════════════════════════════
      // Lets the user add several qty/price combos for the SAME item name
      // in a single "Add Item" click (e.g. 5 pcs at old rate + 10 pcs at new rate).
      let extraVariantRows = []; // [{ rowId, unit }]

      function addVariantRow() {
        const rowId = uid();
        extraVariantRows.push({ rowId, unit: "PCS" });
        renderExtraVariantRows();
      }

      function removeVariantRow(rowId) {
        extraVariantRows = extraVariantRows.filter((r) => r.rowId !== rowId);
        renderExtraVariantRows();
      }

      function setExtraUnit(rowId, unit) {
        const row = extraVariantRows.find((r) => r.rowId === rowId);
        if (row) row.unit = unit;
        document
          .querySelectorAll(`.qty-unit-btn[data-row="${rowId}"]`)
          .forEach((b) => b.classList.toggle("active", b.dataset.unit === unit));
      }

      function renderExtraVariantRows() {
        const wrap = document.getElementById("extra-variants");
        if (!wrap) return;
        wrap.innerHTML = extraVariantRows
          .map((row, idx) => {
            const units = ["PCS", "KG", "GM", "BOX", "ML", "L"];
            const unitBtns = units
              .map(
                (u) =>
                  `<button type="button" class="qty-unit-btn${row.unit === u ? " active" : ""}" data-row="${row.rowId}" data-unit="${u}" onclick="setExtraUnit('${row.rowId}','${u}')">${u}</button>`,
              )
              .join("");
            return `
        <div class="extra-variant-card" data-row-id="${row.rowId}">
          <div class="extra-variant-hdr">
            <span class="extra-variant-label">Variant ${idx + 2}</span>
            <button type="button" class="extra-variant-remove" onclick="removeVariantRow('${row.rowId}')">✕ Remove</button>
          </div>
          <div class="variant-wrap" style="margin-bottom:8px;">
            <input
              type="text"
              id="ev-variant-${row.rowId}"
              placeholder="Variant / Size — e.g. 200ml"
              autocomplete="off"
              autocorrect="off"
              spellcheck="false"
            />
          </div>
          <div class="qty-row" style="margin-bottom:8px;">
            <label>Quantity</label>
            <div class="qty-inp-wrap">
              <input type="number" placeholder="0" inputmode="decimal" min="0" step="1" id="ev-qty-${row.rowId}"/>
              <div class="qty-unit-btns">${unitBtns}</div>
            </div>
          </div>
          <div class="prices-row" style="margin-bottom:0;">
            <div class="price-input-wrap buy-wrap">
              <label>Buy Price</label>
              <div style="position: relative">
                <span class="rupee">₹</span>
                <input type="number" placeholder="0" inputmode="decimal" min="0" step="0.01" id="ev-buy-${row.rowId}"/>
              </div>
            </div>
            <div class="price-input-wrap sell-wrap">
              <label>Sell Price</label>
              <div style="position: relative">
                <span class="rupee">₹</span>
                <input type="number" placeholder="0" inputmode="decimal" min="0" step="0.01" id="ev-sell-${row.rowId}"/>
              </div>
            </div>
          </div>
        </div>`;
          })
          .join("");
      }

      // ══ FORM LOGIC ══════════════════════════════════════════
      function showNameSuggestions(query) {
        const box = document.getElementById('name-suggestions');
        if (!query || query.length < 1) { box.style.display = 'none'; return; }
        const q = query.toLowerCase();
        const matches = items.filter(it => it.name.toLowerCase().includes(q)).slice(0, 8);
        if (!matches.length) { box.style.display = 'none'; return; }
        box.innerHTML = matches.map((it, i) => 
          `<div onclick="selectNameSuggestion('${it.id}')" style="padding:11px 16px;cursor:pointer;font-size:14px;font-weight:600;color:var(--g9);border-bottom:1px solid var(--g2);transition:background 0.15s;" onmouseover="this.style.background='var(--g1)'" onmouseout="this.style.background=''">${it.name}${it.variant ? ` <span class="item-variant-tag">${it.variant}</span>` : ""}</div>`
        ).join('');
        box.style.display = 'block';
      }
      function selectNameSuggestion(itemId) {
        const picked = items.find((it) => it.id === itemId);
        if (!picked) return;
        const el = document.getElementById('inp-name');
        el.value = picked.name;
        document.getElementById('inp-variant').value = picked.variant || '';
        document.getElementById('name-suggestions').style.display = 'none';
        document.getElementById('clear-btn').style.display = 'block';

        // Auto-fill Buy/Sell/Qty/Unit from the exact variant the user picked.
        // User can still edit these freely afterward.
        document.getElementById('inp-buy').value = picked.buy || '';
        document.getElementById('inp-sell').value = picked.sell || '';
        document.getElementById('inp-qty').value = picked.qty || '';
        setUnit(picked.unit || 'PCS');
        calcPreview();

        checkAddBtn();
        focusBuy();
      }
      function onNameKeydown(e) {
        if (e.key === 'Enter') { document.getElementById('name-suggestions').style.display = 'none'; focusBuy(); }
        if (e.key === 'Escape') { document.getElementById('name-suggestions').style.display = 'none'; }
      }
      function onNameInput(el) {
        document.getElementById("clear-btn").style.display = el.value ? "block" : "none";
        showNameSuggestions(el.value);
        checkAddBtn();
      }
      function clearForm() {
        document.getElementById("inp-name").value = "";
        document.getElementById("inp-variant").value = "";
        const sugBox = document.getElementById("name-suggestions");
        if (sugBox) sugBox.style.display = "none";
        document.getElementById("inp-buy").value = "";
        document.getElementById("inp-sell").value = "";
        document.getElementById("inp-qty").value = "";
        document.getElementById("clear-btn").style.display = "none";
        document.getElementById("pp").style.display = "none";
        document.getElementById("add-btn").disabled = true;
        extraVariantRows = [];
        renderExtraVariantRows();
        document.getElementById("inp-name").focus();
        if (currentEditId) {
          currentEditId = null;
          renderList();
        }
      }
      function focusBuy() {
        document.getElementById("inp-buy").focus();
      }

      function calcPreview() {
        const b = parseFloat(document.getElementById("inp-buy").value) || 0;
        const s = parseFloat(document.getElementById("inp-sell").value) || 0;
        const pp = document.getElementById("pp");
        if (b > 0 && s > 0) {
          const diff = s - b;
          const pct = ((diff / b) * 100).toFixed(1);
          pp.style.display = "flex";
          pp.className = "profit-preview " + (diff >= 0 ? "pos" : "neg");
          document.getElementById("pp-val").textContent =
            (diff >= 0 ? "+₹" : "₹") + diff.toFixed(2);
          document.getElementById("pp-val").className =
            "pp-value " + (diff >= 0 ? "pos" : "neg");
          document.getElementById("pp-pct").textContent =
            (diff >= 0 ? "+" : "") + pct + "% margin";
        } else {
          pp.style.display = "none";
        }
        checkAddBtn();
      }

      function checkAddBtn() {
        const n = document.getElementById("inp-name").value.trim();
        const b = parseFloat(document.getElementById("inp-buy").value) || 0;
        const s = parseFloat(document.getElementById("inp-sell").value) || 0;
        document.getElementById("add-btn").disabled = !(n && b > 0 && s > 0);
      }

      function addItem() {
        const name = document.getElementById("inp-name").value.trim();
        const variant = document.getElementById("inp-variant").value.trim();
        const buy = parseFloat(document.getElementById("inp-buy").value) || 0;
        const sell = parseFloat(document.getElementById("inp-sell").value) || 0;
        const qty = parseFloat(document.getElementById("inp-qty").value) || 0;
        const areaId = document.getElementById("inp-area").value;
        const shopId = document.getElementById("inp-shop").value;

        if (!name) {
          showToast("⚠️ Please enter an item name!");
          return;
        }

        const areaObj = areas.find((a) => a.id === areaId);
        const shopObj = areaObj
          ? areaObj.shops.find((s) => s.id === shopId)
          : null;
        const areaName = areaObj ? areaObj.name : "";
        const shopName = shopObj ? shopObj.name : "";

        // Build the list of variant entries to save: the main row first,
        // then every extra variant row the user added (same item name,
        // different qty/unit/buy/sell — e.g. old stock vs new stock,
        // or different sizes like 500ml vs 200ml).
        // The MAIN row is only included if it actually has both prices —
        // this lets the user fill in ONLY the extra rows if they want.
        const entries = [];
        if (buy && sell) {
          entries.push({ variant, buy, sell, qty, unit: currentUnit });
        }

        for (const row of extraVariantRows) {
          const evBuy =
            parseFloat(
              (document.getElementById("ev-buy-" + row.rowId) || {}).value,
            ) || 0;
          const evSell =
            parseFloat(
              (document.getElementById("ev-sell-" + row.rowId) || {}).value,
            ) || 0;
          const evQty =
            parseFloat(
              (document.getElementById("ev-qty-" + row.rowId) || {}).value,
            ) || 0;
          const evVariant = (
            (document.getElementById("ev-variant-" + row.rowId) || {}).value || ""
          ).trim();
          if (!evBuy || !evSell) continue; // skip incomplete extra rows
          entries.push({ variant: evVariant, buy: evBuy, sell: evSell, qty: evQty, unit: row.unit });
        }

        if (!entries.length) {
          showToast("⚠️ Please enter Buy & Sell price for at least one variant!");
          return;
        }

        // Guard: if two entries in THIS SAME click share the same variant
        // label (e.g. both left blank), they'd collide and overwrite each
        // other. Catch that here instead of silently merging them.
        if (entries.length > 1) {
          const seen = new Set();
          for (const e of entries) {
            const key = e.variant.toLowerCase();
            if (seen.has(key)) {
              showToast(
                key
                  ? `⚠️ Two variants both say "${e.variant}" — give each a different Variant/Size label!`
                  : "⚠️ Please give each extra variant a different Variant/Size label (e.g. 200ml)!",
              );
              return;
            }
            seen.add(key);
          }
        }

        let addedCount = 0;
        let updatedCount = 0;

        for (const entry of entries) {
          // Duplicate = same name + same variant + same shop
          const existing = items.find(
            (i) =>
              i.name.toLowerCase() === name.toLowerCase() &&
              (i.variant || "").toLowerCase() === entry.variant.toLowerCase() &&
              (i.areaId || "") === (areaObj ? areaObj.id : "") &&
              (i.shopId || "") === (shopObj ? shopObj.id : ""),
          );

          if (existing) {
            const ok = confirm(
              "This item already exists" +
                (shopName ? " in " + shopName : "") +
                ". Update it?",
            );
            if (!ok) continue;
            existing.buy = entry.buy;
            existing.sell = entry.sell;
            existing.qty = entry.qty;
            existing.unit = entry.unit;
            existing.variant = entry.variant;
            existing.area = areaName;
            existing.shop = shopName;
            existing.areaId = areaObj ? areaObj.id : null;
            existing.shopId = shopObj ? shopObj.id : null;
            updatedCount++;
          } else {
            items.unshift({
              id: uid(),
              name,
              variant: entry.variant,
              buy: entry.buy,
              sell: entry.sell,
              qty: entry.qty,
              unit: entry.unit,
              area: areaName,
              shop: shopName,
              areaId: areaObj ? areaObj.id : null,
              shopId: shopObj ? shopObj.id : null,
              available: true,
            });
            addedCount++;
          }
        }

        if (addedCount && updatedCount) {
          showToast(`✅ ${name} — ${addedCount} added, ${updatedCount} updated!`);
        } else if (addedCount > 1) {
          showToast(`✅ ${name} — ${addedCount} variants added!`);
        } else if (addedCount) {
          showToast("✅ " + name + " added!");
        } else if (updatedCount) {
          showToast("✅ " + name + " updated!");
        }

        clearForm();
        renderList();
        updateSummary();
        renderHomeAvailability();
        renderBrowse();
        scheduleSave();
      }

      // ══ LIST ════════════════════════════════════════════════
      function renderList() {
        const searchEl = document.getElementById("search-inp");
        const q = searchEl ? (searchEl.value || "").toLowerCase().trim() : "";
        const filtered = q
          ? items.filter(
              (i) =>
                i.name.toLowerCase().includes(q) ||
                (i.variant || "").toLowerCase().includes(q),
            )
          : items;
        const el = document.getElementById("item-list");
        const cnt = document.getElementById("search-count");

        if (cnt)
          cnt.textContent = q
            ? `${filtered.length} result${filtered.length !== 1 ? "s" : ""}`
            : "";
        if (!el) return;

        renderHomeAvailability();

        if (!items.length) {
          el.innerHTML = `<div class="empty-state">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
        <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
        <path d="M16 3h-8v4h8V3z"/>
      </svg>
      <p>No items added yet.<br/>Enter item name and prices above<br/>to get started.</p>
    </div>`;
          return;
        }

        if (filtered.length === 0) {
          el.innerHTML = `<div class="empty-state"><p>No results for "${q}".</p></div>`;
          return;
        }

        el.innerHTML = filtered
          .map((item, idx) => {
            const diff = item.sell - item.buy;
            const pct = item.buy ? ((diff / item.buy) * 100).toFixed(1) : 0;
            const cls = diff >= 0 ? "pos" : "neg";
            const isEditing = currentEditId === item.id;
            const qtyTxt = item.qty ? `${item.qty} ${item.unit || "PCS"}` : "";
            const shopTxt = item.shop
              ? `${item.area ? item.area + " · " : ""}${item.shop}`
              : item.area || "";
            const isAvailable = item.available !== false;
            return `
    <div class="item-card ${isEditing ? "editing" : ""} ${!isAvailable ? "unavailable" : ""}" id="card-${item.id}" onclick="handleCardClick('${item.id}', event)">
      <div class="item-left">
        <div class="item-name">${item.name}${item.variant ? ` <span class="item-variant-tag">${item.variant}</span>` : ""}</div>
        <div class="item-prices">
          <span class="price-tag buy-tag">₹${item.buy.toFixed(2)}</span>
          <span class="price-arrow">→</span>
          <span class="price-tag sell-tag">₹${item.sell.toFixed(2)}</span>
        </div>
        ${item.qty ? `<div class="item-qty-badge">📦 ${item.qty}</div>` : ""}
        ${shopTxt ? `<div class="item-shop-badge">🏪 ${shopTxt}</div>` : ""}
      </div>
      <div class="item-right">
        <span class="profit-badge ${cls}">${diff >= 0 ? "+₹" : "₹"}${diff.toFixed(2)}</span>
        <span class="profit-pct">${pct}% margin</span>
        <div style="display:flex;gap:4px;margin-top:2px;">
          <button class="toggle-btn ${isAvailable ? "on" : "off"}" onclick="toggleAvailable('${item.id}', event)" title="${isAvailable ? "Available - click to mark unavailable" : "Unavailable - click to mark available"}">${isAvailable ? "ON" : "OFF"}</button>
          <button class="mini-del-btn" onclick="deleteItem('${item.id}', event)" title="Delete item">Del</button>
        </div>
      </div>
      <div class="item-edit-row">
        <div class="ie-row-top">
          <div class="ie-wrap">
            <input class="ie-inp" id="ie-name-${item.id}" type="text" placeholder="Item name" value="${item.name}" onclick="event.stopPropagation()" oninput="iePreview('${item.id}')"/>
          </div>
          <div class="ie-wrap">
            <input class="ie-inp" id="ie-variant-${item.id}" type="text" placeholder="Variant" value="${item.variant || ""}" onclick="event.stopPropagation()" oninput="iePreview('${item.id}')"/>
          </div>
        </div>
        <div class="ie-row-bottom">
          <div class="ie-wrap">
            <span class="ie-rupee">₹</span>
            <input class="ie-inp" id="ie-buy-${item.id}" type="number" inputmode="decimal" placeholder="Buy" value="${item.buy}" onclick="event.stopPropagation()" oninput="iePreview('${item.id}')"/>
          </div>
          <div class="ie-wrap">
            <span class="ie-rupee">₹</span>
            <input class="ie-inp" id="ie-sell-${item.id}" type="number" inputmode="decimal" placeholder="Sell" value="${item.sell}" onclick="event.stopPropagation()" oninput="iePreview('${item.id}')"/>
          </div>
          <div class="ie-wrap">
            <input class="ie-inp" id="ie-qty-${item.id}" type="number" inputmode="decimal" placeholder="Qty" value="${item.qty || ""}" onclick="event.stopPropagation()" oninput="iePreview('${item.id}')" onkeydown="if(event.key==='Enter')saveInlineEdit('${item.id}')"/>
          </div>
          <button class="save-ie" onclick="saveInlineEdit('${item.id}'); event.stopPropagation()">Save</button>
        </div>
        <div class="ie-unit-row" onclick="event.stopPropagation()">
          ${["PCS","KG","GM","BOX","ML","L"].map(u => `<button type="button" class="qty-unit-btn ie-unit-btn${(item.unit || "PCS") === u ? " active" : ""}" data-row="ie-${item.id}" data-unit="${u}" onclick="setIeUnit('${item.id}','${u}')">${u}</button>`).join("")}
        </div>
      </div>
    </div>`;
          })
          .join("");
      }

      function handleCardClick(id, e) {
        if (
          e.target.classList.contains("del-btn") ||
          e.target.classList.contains("mini-del-btn") ||
          e.target.classList.contains("toggle-btn") ||
          e.target.closest(".item-edit-row") ||
          e.target.classList.contains("save-ie")
        )
          return;
        if (currentEditId === id) {
          currentEditId = null;
        } else {
          currentEditId = id;
        }
        renderList();
        if (currentEditId) {
          setTimeout(() => {
            const inp = document.getElementById("ie-name-" + id);
            if (inp) inp.focus();
          }, 50);
        }
      }

      function iePreview(id) {
        // just live validation — no visual needed here, save on Save
      }

      function setIeUnit(id, unit) {
        ieUnitOverrides[id] = unit;
        document
          .querySelectorAll(`.qty-unit-btn[data-row="ie-${id}"]`)
          .forEach((b) => b.classList.toggle("active", b.dataset.unit === unit));
      }

      function saveInlineEdit(id) {
        const nameInp = document.getElementById("ie-name-" + id);
        const newName = nameInp ? nameInp.value.trim() : "";
        const variantInp = document.getElementById("ie-variant-" + id);
        const newVariant = variantInp ? variantInp.value.trim() : "";
        const b =
          parseFloat(document.getElementById("ie-buy-" + id).value) || 0;
        const s =
          parseFloat(document.getElementById("ie-sell-" + id).value) || 0;
        const q =
          parseFloat(document.getElementById("ie-qty-" + id).value) || 0;
        if (!b || !s) {
          showToast("⚠️ Please enter both prices!");
          return;
        }
        if (!newName) {
          showToast("⚠️ Item name can't be empty!");
          return;
        }
        const item = items.find((i) => i.id === id);
        if (item) {
          item.name = newName;
          item.variant = newVariant;
          item.buy = b;
          item.sell = s;
          item.qty = q;
          item.unit = ieUnitOverrides[id] || item.unit || "PCS";
        }
        delete ieUnitOverrides[id];
        currentEditId = null;
        renderList();
        updateSummary();
        renderBrowse();
        scheduleSave();
        showToast("✅ Item updated!");
      }

      function deleteItem(id, e) {
        e.stopPropagation();
        const item = items.find((i) => i.id === id);
        if (!item) return;
        if (!confirm('"' + item.name + '" will be deleted. Continue?')) return;
        items = items.filter((i) => i.id !== id);
        if (currentEditId === id) currentEditId = null;
        renderList();
        updateSummary();
        renderBrowse();
        scheduleSave();
        showToast("🗑 Deleted");
      }

      function toggleAvailable(id, e) {
        e.stopPropagation();
        const item = items.find((i) => i.id === id);
        if (!item) return;
        item.available = item.available === false ? true : false;
        renderList();
        renderBrowse();
        scheduleSave();
        showToast(item.available ? "✅ " + item.name + " — Available" : "⛔ " + item.name + " — Unavailable");
      }

      // ══ SUMMARY ════════════════════════════════════════════
      function updateSummary() {
        const totalShops = areas.reduce((s, a) => s + a.shops.length, 0);
        document.getElementById("s-items").textContent = items.length;
        document.getElementById("s-areas").textContent = areas.length;
        document.getElementById("s-shops").textContent = totalShops;
      }

      // ══ TOAST ══════════════════════════════════════════════
      let _tt = null;
      function showToast(msg) {
        const t = document.getElementById("toast");
        if (_tt) {
          clearTimeout(_tt);
          t.classList.remove("show");
        }
        t.textContent = msg;
        void t.offsetWidth;
        t.classList.add("show");
        _tt = setTimeout(() => {
          t.classList.remove("show");
          _tt = null;
        }, 2200);
      }
    </script>
  </body>
</html>
